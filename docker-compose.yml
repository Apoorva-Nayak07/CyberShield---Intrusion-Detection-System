version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: cybershield-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cybershield
    networks:
      - cybershield-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cybershield-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/cybershield
      JWT_SECRET: ${JWT_SECRET:-cybershield-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-cybershield-refresh-secret}
      ML_SERVICE_URL: http://ml-service:5001
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - cybershield-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: cybershield-ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    networks:
      - cybershield-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_SOCKET_URL: http://localhost:5000
    container_name: cybershield-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cybershield-network

volumes:
  mongodb_data:

networks:
  cybershield-network:
    driver: bridge
